<!doctype html><html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PRIME DOCS</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B2A4E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PRIME DOCS">
<link rel="apple-touch-icon" href="icon-192.png">
<!-- D184: бланк печатается ЭТИМ документом → шрифты бренда нужны здесь. (Приложение шлёт и свой @import,
     но он приходит внутри склейки стилей и может оказаться не первым правилом — на @import это фатально.) -->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
<style>
  html,body{margin:0;height:100%;background:#e9e7e0;overflow:hidden}
  /* ПЕЧАТЬ: бумага A4. @page внутри приложения НЕ работает — оно в iframe, а при печати действует @page
     ВЕРХНЕГО документа (этой обёртки). Без этого браузер печатал Letter (612×792) вместо A4 → «не тот вид».
     Поля НЕ задаём: у бланка сметы и бланка документа они разные, каждый держит свои отступы сам. */
  @page{size:A4 portrait;margin:12mm}
  /* Фон обёртки (#e9e7e0) при печати заливал бы всю страницу серым — верхний документ печатается тоже. */
  @media print{ html,body{background:#fff!important} }
  :root{--barh:34px}
  .pdapp{position:fixed;inset:0;width:100%;height:100%;border:0}
  #ld{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;
      font-family:system-ui,-apple-system,sans-serif;color:#6E7480;background:#e9e7e0;font-size:15px}
  /* MULTI: панель открытых экранов — видна ТОЛЬКО когда открыто 2+ экрана (при одном всё как раньше) */
  .pdbar{position:fixed;top:0;left:0;right:0;z-index:5;display:none;align-items:center;gap:4px;box-sizing:border-box;
       padding:0 4px;padding-top:env(safe-area-inset-top);height:calc(var(--barh) + env(safe-area-inset-top));
       background:#1B2A4E;color:#fff;font:600 12px system-ui,-apple-system,sans-serif}
  body.multi .pdbar{display:flex}
  body.multi .pdapp{top:calc(var(--barh) + env(safe-area-inset-top));height:calc(100% - var(--barh) - env(safe-area-inset-top))}
  body.printing .pdbar{display:none}
  .pdbar .pdnav{flex:none;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;
            cursor:pointer;font-size:18px;line-height:1;opacity:.9;user-select:none}
  .pdbar .pdnav:active{background:rgba(255,255,255,.18)}
  .pdbar .pdnav.off{opacity:.28}
  .pdbar .pdtabs{flex:1;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
  .pdbar .pdtabs::-webkit-scrollbar{display:none}
  .pdbar .pdtab{flex:none;display:flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;cursor:pointer;
            white-space:nowrap;background:rgba(255,255,255,.14)}
  .pdbar .pdtab.on{background:#C9A961;color:#1B2A4E}
  .pdbar .pdtab i{font-style:normal;opacity:.7;font-size:12px;padding:0 2px}
  .pdbar .pdtab i:active{opacity:1}
  @media print{.pdbar{display:none!important}}
  /* D184: бланк печатаем ЗДЕСЬ, в верхнем документе (см. скрипт ниже). На экране он не виден никогда —
     показывается только на время печати. Стили бланка приходят из приложения и вставляются ПЕРЕД этим
     блоком, поэтому правила ниже перебивают их (порядок + !important). */
  #pdpaper{display:none}
  body.papering #pdpaper{display:block;background:#fff}
  body.papering #stage,body.papering .pdbar{display:none!important}
  /* у обёртки html,body — overflow:hidden + height:100% (это «оболочка» экрана). Для бумаги их надо
     распустить, иначе многостраничный бланк обрежется на первой странице. */
  html.papering,body.papering{overflow:visible!important;height:auto!important;background:#fff!important}
  @media print{ body.papering #pdpaper{display:block!important} }
</style></head>
<body>
<div id="ld">Загрузка PRIME DOCS…</div>
<div class="pdbar" id="bar"><span class="pdnav" id="prev">‹</span><span class="pdtabs" id="tabs"></span><span class="pdnav" id="next">›</span></div>
<div id="stage"></div>
<div id="pdpaper"></div>
<script>
/* A9 ТЁПЛЫЙ ШЕЛЛ: 3 iframe (journal/estimate/assemble), переключаем видимый + шлём целевому pdgo вместо
   перезагрузки. Ключевое: pdgo шлём на сохранённое из pdready окно app (e.source), НЕ на frame.contentWindow
   (2-уровневый GAS-iframe: contentWindow=sandbox, до кода app не доходит — проверено на форке).
   Все 3 экрана — WARM (у каждого приёмник pdgo). Не-WARM экран (если появится) грузился бы перезагрузкой. */
var EXEC = "https://script.google.com/macros/s/AKfycbyQmZhfbPsO1PxDvNXYLcywIQOsjyzCOLX77iHbi7IA6TflNAxwTgx6gAvUr4NnkYlu/exec";
var stage = document.getElementById('stage');
var WARM = { journal:1, assemble:1, estimate:1, checklist:1 };   // все экраны тёплые (у каждого приёмник pdgo). D185: +checklist
var SCREENS = { journal:null, estimate:null, assemble:null, checklist:null };   // D185: +checklist
/* D179 ЗАМОК: приложение закрыто кодом. Пропуск выдаёт сервер после ввода кода; ОБЁРТКА его помнит
   (localStorage этого сайта) и подставляет к КАЖДОМУ адресу /exec — экраны и печать. Нет пропуска →
   приложение само покажет окно ввода кода и пришлёт {pdtoken} наверх (см. обработчик сообщений).
   Замок выключен → пропуска нет → withTok ничего не меняет, всё работает как раньше. */
var PD_TOKEN = ''; try{ PD_TOKEN = localStorage.getItem('pd_token') || ''; }catch(e){}
function withTok(qs){ qs=qs||''; if(!PD_TOKEN) return qs; if(/[?&]t=/.test(qs)) return qs; return qs + (qs.indexOf('?')===0?'&':'?') + 't=' + encodeURIComponent(PD_TOKEN); }
function screenOf(qs){ qs=qs||''; if(/[?&]estimate=1/.test(qs))return 'estimate'; if(/[?&]assemble=1/.test(qs))return 'assemble'; if(/[?&]checklist=1/.test(qs))return 'checklist'; return 'journal'; }   // D185
function bootUrl(screen, qs){ if(screen==='journal') return EXEC + withTok(/[?&]openProj=/.test(qs||'')?qs:''); return EXEC + withTok(qs); }
function makeFrame(screen, qs){
  var f=document.createElement('iframe'); f.className='pdapp'; f.style.display='none';
  f.setAttribute('allow','web-share; clipboard-write; clipboard-read');
  var rec={ frame:f, appWin:null, ready:false, pending:null }; SCREENS[screen]=rec;
  f.addEventListener('load', function(){ var l=document.getElementById('ld'); if(l) l.style.display='none'; });
  f.src=bootUrl(screen, qs); stage.appendChild(f); return rec;
}
function showFrame(screen){ Object.keys(SCREENS).forEach(function(k){ var r=SCREENS[k]; if(r) r.frame.style.display=(k===screen?'block':'none'); }); }
/* MULTI: несколько ОТКРЫТЫХ экранов (смета / её документ / журнал) — вкладки + ‹ › + ✕ закрыть.
   Экраны уже тёплые → переключение мгновенное и СОХРАНЯЕТ состояние (switchTo не шлёт pdgo).
   Свайп пальцем поверх iframe поймать нельзя (cross-origin: события внутрь не всплывают) → листаем стрелками/вкладками.
   Панель появляется ТОЛЬКО при 2+ открытых экранах — при одном поведение как раньше. */
var OPEN=[], CUR='';
var LBL={ journal:'Журнал', estimate:'Смета', assemble:'Документ', checklist:'Чек-лист' };   // D185
function renderBar(){
  document.body.classList.toggle('multi', OPEN.length>1);
  var t=document.getElementById('tabs'); if(!t) return;
  t.innerHTML=OPEN.map(function(s){
    return '<span class="pdtab'+(s===CUR?' on':'')+'" data-s="'+s+'">'+(LBL[s]||s)+(s==='journal'?'':'<i data-x="'+s+'" title="Закрыть">✕</i>')+'</span>';
  }).join('');
  var i=OPEN.indexOf(CUR), pv=document.getElementById('prev'), nx=document.getElementById('next');
  if(pv) pv.className='pdnav'+(i<=0?' off':'');
  if(nx) nx.className='pdnav'+(i<0||i>=OPEN.length-1?' off':'');
}
function openAdd(s){ if(OPEN.indexOf(s)<0) OPEN.push(s); CUR=s; renderBar(); }
function switchTo(s){ if(OPEN.indexOf(s)<0) return; CUR=s; showFrame(s); renderBar(); }
function pageBy(d){ var i=OPEN.indexOf(CUR); if(i<0) return; var j=i+d; if(j<0||j>=OPEN.length) return; switchTo(OPEN[j]); }
function closeScreen(s){
  if(s==='journal') return;                                  // журнал — база, не закрываем
  var i=OPEN.indexOf(s); if(i<0) return;
  OPEN.splice(i,1);
  var r=SCREENS[s]; if(r) r.frame.style.display='none';       // iframe остаётся тёплым → повторное открытие мгновенно
  if(CUR===s){ CUR=OPEN[Math.max(0,i-1)]||'journal'; showFrame(CUR); }
  renderBar();
}
document.getElementById('bar').addEventListener('click', function(ev){
  var x=ev.target.closest && ev.target.closest('[data-x]'); if(x){ ev.stopPropagation(); closeScreen(x.getAttribute('data-x')); return; }
  var t=ev.target.closest && ev.target.closest('[data-s]'); if(t){ switchTo(t.getAttribute('data-s')); return; }
});
document.getElementById('prev').addEventListener('click', function(){ pageBy(-1); });
document.getElementById('next').addEventListener('click', function(){ pageBy(1); });
function sendGo(rec, qs){ if(rec.ready && rec.appWin){ rec.appWin.postMessage({pdgo:qs},'*'); } else { rec.pending=qs; } }
var HIST=[];   // стек показанных qs — «Назад» = вернуться на предыдущий (истинная история переходов)
function pushHist(qs){ qs=qs||''; if(HIST[HIST.length-1]!==qs) HIST.push(qs); if(HIST.length>40) HIST.shift(); }
function route(qs, isBack){
  var screen=screenOf(qs); var rec=SCREENS[screen];
  if(!rec){ makeFrame(screen, qs); showFrame(screen); }                        // холодный старт сразу на нужном qs
  else if(WARM[screen]){ showFrame(screen); sendGo(rec, qs); }                 // тёплый — навигация внутрь без релоада
  else { rec.frame.src=bootUrl(screen, qs); rec.ready=false; rec.appWin=null; showFrame(screen); }   // не-тёплый
  openAdd(screen);                                                            // MULTI: экран открыт → появляется во вкладках
  if(!isBack) pushHist(qs);
}
function goBack(){ if(HIST.length>1){ HIST.pop(); route(HIST[HIST.length-1], true); } else { route('', true); } }   // некуда → журнал
/* D139: печать без баннера — грузим /exec autoprint в отдельный iframe (в iframe баннера нет), приложение
   сигналит pdprintready → печатаем сверху (github.io). Тёплые экраны прячем, чтобы печаталась только форма. */
var _pf=null, _pfTimer=null;
function cleanupPrint(){ if(_pfTimer){ clearTimeout(_pfTimer); _pfTimer=null; } if(_pf){ try{ _pf.remove(); }catch(e){} _pf=null; } var s=document.getElementById('stage'); if(s) s.style.display=''; document.body.classList.remove('printing'); }   // MULTI: вернуть панель после печати
// 1.5с не хватало на телефоне: диалог печати ещё не снял страницу, а рамку уже убирали → пустой лист.
function doPrint(){ if(!_pf) return; if(_pfTimer){ clearTimeout(_pfTimer); _pfTimer=null; } try{ window.print(); }catch(e){} setTimeout(cleanupPrint, 6000); }
function startPrint(qs){
  cleanupPrint();
  document.body.classList.add('printing');                                    // MULTI: панель вкладок не должна попасть в печать
  var s=document.getElementById('stage'); if(s) s.style.display='none';
  var f=document.createElement('iframe'); f.id='printframe'; f.setAttribute('allow','web-share');
  f.style.cssText='position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff;z-index:9999';
  f.src=EXEC+withTok(qs); document.body.appendChild(f); _pf=f;   // D179: пропуск нужен и печатной рамке
  _pfTimer=setTimeout(doPrint, 4000);   // фолбэк, если pdprintready не пришёл
}
/* ⚠ НЕ убирать печатную рамку по раннему afterprint: на Android он прилетает ДО того, как диалог снял
   страницу → рамка исчезает и на предпросмотре ПУСТОЙ ЛИСТ (живой случай 17.07). Держим паузу. */
window.addEventListener('afterprint', function(){ setTimeout(cleanupPrint, 6000); });

/* D184: ПЕЧАТЬ БЛАНКА ЗДЕСЬ (не в iframe). Приложение присылает готовый HTML бланка + свои стили,
   мы кладём их в ЭТОТ документ и печатаем. Почему так: приложение живёт в cross-origin GAS-iframe,
   а телефон при печати снимает с такого iframe ЭКРАННУЮ картинку, не включая @media print → на бумагу
   уходил редактор со чекбоксами, а бланк (он скрыт до печати) не попадал вообще. Здесь, наверху,
   работают и @page A4, и @media print — на любом устройстве, и «экран = бумага».
   Стили приложения вставляем ПЕРВЫМИ в head: наш статичный <style> идёт после и перебивает их. */
var _paperCss=null;
/* Окно-отправитель обязано быть окном ОДНОГО ИЗ НАШИХ экранов (запоминаем их на pdready, см. ниже)
   либо печатной рамки. Это строже origin: домен googleusercontent.com общий для всех Apps Script мира. */
function isOurAppWin(src){
  if(!src) return false;
  var ok=false;
  Object.keys(SCREENS).forEach(function(k){ var r=SCREENS[k]; if(r && r.appWin && r.appWin===src) ok=true; });
  if(!ok && _pf){ try{ if(_pf.contentWindow===src) ok=true; }catch(e){} }
  return ok;
}
function cleanupPaper(){
  document.body.classList.remove('papering');
  document.documentElement.classList.remove('papering');
  var p=document.getElementById('pdpaper'); if(p) p.innerHTML='';
  if(_paperCss){ try{ _paperCss.remove(); }catch(e){} _paperCss=null; }
}
function printPaper(o){
  if(!o || typeof o.html!=='string' || !o.html) return false;   // нечего печатать → и ack не даём, чтобы сработал прежний путь
  cleanupPrint(); cleanupPaper();
  if(typeof o.css==='string' && o.css){
    var s=document.createElement('style'); s.id='pdpapercss'; s.textContent=o.css;
    document.head.insertBefore(s, document.head.firstChild); _paperCss=s;
  }
  var p=document.getElementById('pdpaper'); p.innerHTML=o.html;
  document.body.classList.add('papering');
  document.documentElement.classList.add('papering');
  try{ window.scrollTo(0,0); }catch(e){}
  setTimeout(function(){ try{ window.print(); }catch(e){} armPaperCleanup(); }, 400);   // 400мс — дать шрифтам/раскладке осесть
}
/* ⚠ Уборка бумаги — ТОЛЬКО НЕ РАНЬШЕ, чем система реально сняла страницу.
   Грабли (17.07, живой случай — «печатается чистая страница»): на Android `window.print()` открывает
   системный диалог АСИНХРОННО, а событие `afterprint` прилетает практически сразу — ДО того, как диалог
   снял содержимое. Уборка по afterprint стирала бланк у диалога из-под носа → на предпросмотре пустой лист.
   Раньше тут стоял таймер 1.5с — он «случайно» работал именно потому, что не слушал afterprint.
   Теперь: держим бумагу минимум HOLD мс, и только потом реагируем на сигналы возврата. */
var PAPER_HOLD_MS = 6000;   // столько бумага гарантированно живёт после вызова печати
function armPaperCleanup(){
  var done=false, armed=false;
  function fin(){ if(done) return; done=true;
    window.removeEventListener('afterprint', fin); window.removeEventListener('focus', fin);
    cleanupPaper();
  }
  setTimeout(function(){   // до этого момента НИКАКИЕ сигналы бумагу не убирают
    if(done) return;
    armed=true;
    window.addEventListener('afterprint', fin);
    window.addEventListener('focus', fin);
  }, PAPER_HOLD_MS);
  setTimeout(fin, 90000);   // последний рубеж: не залипнуть с бланком вместо экранов
}

window.addEventListener('message', function(ev){
  var d=ev.data; if(!d) return;
  if(d.pdprintdoc){                                                              // D184: печать бланка верхним документом
    /* ⚠ ПРОВЕРЯЕМ ОКНО, А НЕ ДОМЕН (находка ревью, до прода). Маска `*.googleusercontent.com` НЕ годится:
       на этом домене Google исполняет пользовательский код ЛЮБОГО Apps Script — то есть проверку проходил
       чужой скрипт. А тут html идёт в innerHTML, и `<img onerror>` выполнился бы в origin ОБЁРТКИ, где
       лежит пропуск (localStorage) → кража пропуска и обход замка. Доверяем только окнам СВОИХ экранов
       (их запоминаем на pdready) — чужое окно им не является. */
    if(!isOurAppWin(ev.source)) return;
    if(!printPaper(d.pdprintdoc)) return;                                        // ack — только если бумага реально собрана
    try{ ev.source.postMessage({pdprintok:true}, ev.origin || '*'); }catch(e){}  // ack: приложение не уйдёт в старый путь
    return;
  }
  if(typeof d.pdtoken==='string'){                                              // D179: код принят — запоминаем пропуск и пересобираем рамки уже с ним
    /* Отправителя проверяем: приложение живёт на google — чужая страница не должна подсовывать пропуск
       (находка ревью: обработчик принимал сообщение от кого угодно). Подделка пропуска сервером всё равно
       отбивается, но чужое сообщение могло бы затереть рабочий пропуск и выбить владельца. */
    var org = String(ev.origin||'');
    if(!/^https:\/\/([a-z0-9-]+\.)*(google\.com|googleusercontent\.com)$/.test(org)) return;
    PD_TOKEN=d.pdtoken; try{ localStorage.setItem('pd_token', PD_TOKEN); }catch(e){}
    try{ location.reload(); }catch(e){}
    return;
  }
  if(typeof d.pdprint==='string'){ startPrint(d.pdprint); return; }              // D139: печать через обёртку
  if(d.pdprintready){ doPrint(); return; }
  if(d.pdback){ goBack(); return; }                                            // «Назад» из экрана → предыдущий по стеку
  if(typeof d.pdnav==='string' && /^(\?[\w=&%.\-]*)?$/.test(d.pdnav)){ route(d.pdnav); return; }
  if(d.pdready && d.screen && SCREENS[d.screen]){
    var rec=SCREENS[d.screen]; rec.appWin=ev.source; rec.ready=true;           // окно app (не contentWindow)
    if(rec.pending){ ev.source.postMessage({pdgo:rec.pending},'*'); rec.pending=null; }
  }
});
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }
route('');   // первый заход — журнал
</script></body></html>
