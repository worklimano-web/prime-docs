<!doctype html><html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PRIME DOCS</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B2A4E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PRIME DOCS">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  html,body{margin:0;height:100%;background:#e9e7e0;overflow:hidden}
  .app{position:fixed;inset:0;width:100%;height:100%;border:0}
  #ld{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;
      font-family:system-ui,-apple-system,sans-serif;color:#6E7480;background:#e9e7e0;font-size:15px}
</style></head>
<body>
<div id="ld">Загрузка PRIME DOCS…</div>
<div id="stage"></div>
<script>
/* A9 ТЁПЛЫЙ ШЕЛЛ: 3 iframe (journal/estimate/assemble), переключаем видимый + шлём целевому pdgo вместо
   перезагрузки. Ключевое: pdgo шлём на сохранённое из pdready окно app (e.source), НЕ на frame.contentWindow
   (2-уровневый GAS-iframe: contentWindow=sandbox, до кода app не доходит — проверено на форке).
   Все 3 экрана — WARM (у каждого приёмник pdgo). Не-WARM экран (если появится) грузился бы перезагрузкой. */
var EXEC = "https://script.google.com/macros/s/AKfycbyQmZhfbPsO1PxDvNXYLcywIQOsjyzCOLX77iHbi7IA6TflNAxwTgx6gAvUr4NnkYlu/exec";
var stage = document.getElementById('stage');
var WARM = { journal:1, assemble:1, estimate:1 };   // все 3 экрана тёплые (у каждого приёмник pdgo)
var SCREENS = { journal:null, estimate:null, assemble:null };
function screenOf(qs){ qs=qs||''; if(/[?&]estimate=1/.test(qs))return 'estimate'; if(/[?&]assemble=1/.test(qs))return 'assemble'; return 'journal'; }
function bootUrl(screen, qs){ if(screen==='journal') return EXEC + (/[?&]openProj=/.test(qs||'')?qs:''); return EXEC + qs; }
function makeFrame(screen, qs){
  var f=document.createElement('iframe'); f.className='app'; f.style.display='none';
  f.setAttribute('allow','web-share; clipboard-write; clipboard-read');
  var rec={ frame:f, appWin:null, ready:false, pending:null }; SCREENS[screen]=rec;
  f.addEventListener('load', function(){ var l=document.getElementById('ld'); if(l) l.style.display='none'; });
  f.src=bootUrl(screen, qs); stage.appendChild(f); return rec;
}
function showFrame(screen){ Object.keys(SCREENS).forEach(function(k){ var r=SCREENS[k]; if(r) r.frame.style.display=(k===screen?'block':'none'); }); }
function sendGo(rec, qs){ if(rec.ready && rec.appWin){ rec.appWin.postMessage({pdgo:qs},'*'); } else { rec.pending=qs; } }
var HIST=[];   // стек показанных qs — «Назад» = вернуться на предыдущий (истинная история переходов)
function pushHist(qs){ qs=qs||''; if(HIST[HIST.length-1]!==qs) HIST.push(qs); if(HIST.length>40) HIST.shift(); }
function route(qs, isBack){
  var screen=screenOf(qs); var rec=SCREENS[screen];
  if(!rec){ makeFrame(screen, qs); showFrame(screen); }                        // холодный старт сразу на нужном qs
  else if(WARM[screen]){ showFrame(screen); sendGo(rec, qs); }                 // тёплый — навигация внутрь без релоада
  else { rec.frame.src=bootUrl(screen, qs); rec.ready=false; rec.appWin=null; showFrame(screen); }   // не-тёплый
  if(!isBack) pushHist(qs);
}
function goBack(){ if(HIST.length>1){ HIST.pop(); route(HIST[HIST.length-1], true); } else { route('', true); } }   // некуда → журнал
/* D139: печать без баннера — грузим /exec autoprint в отдельный iframe (в iframe баннера нет), приложение
   сигналит pdprintready → печатаем сверху (github.io). Тёплые экраны прячем, чтобы печаталась только форма. */
var _pf=null, _pfTimer=null;
function cleanupPrint(){ if(_pfTimer){ clearTimeout(_pfTimer); _pfTimer=null; } if(_pf){ try{ _pf.remove(); }catch(e){} _pf=null; } var s=document.getElementById('stage'); if(s) s.style.display=''; }
function doPrint(){ if(!_pf) return; if(_pfTimer){ clearTimeout(_pfTimer); _pfTimer=null; } try{ window.print(); }catch(e){} setTimeout(cleanupPrint, 1500); }
function startPrint(qs){
  cleanupPrint();
  var s=document.getElementById('stage'); if(s) s.style.display='none';
  var f=document.createElement('iframe'); f.id='printframe'; f.setAttribute('allow','web-share');
  f.style.cssText='position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff;z-index:9999';
  f.src=EXEC+qs; document.body.appendChild(f); _pf=f;
  _pfTimer=setTimeout(doPrint, 4000);   // фолбэк, если pdprintready не пришёл
}
window.addEventListener('afterprint', function(){ setTimeout(cleanupPrint, 200); });
window.addEventListener('message', function(ev){
  var d=ev.data; if(!d) return;
  if(typeof d.pdprint==='string'){ startPrint(d.pdprint); return; }              // D139: печать через обёртку
  if(d.pdprintready){ doPrint(); return; }
  if(d.pdback){ goBack(); return; }                                            // «Назад» из экрана → предыдущий по стеку
  if(typeof d.pdnav==='string' && /^(\?[\w=&%.\-]*)?$/.test(d.pdnav)){ route(d.pdnav); return; }
  if(d.pdready && d.screen && SCREENS[d.screen]){
    var rec=SCREENS[d.screen]; rec.appWin=ev.source; rec.ready=true;           // окно app (не contentWindow)
    if(rec.pending){ ev.source.postMessage({pdgo:rec.pending},'*'); rec.pending=null; }
  }
});
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }
route('');   // первый заход — журнал
</script></body></html>
